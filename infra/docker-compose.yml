services:
  postgres:
    image: postgres:16
    container_name: auction_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # healthcheck:
    #   test: ["CMD-shell", "pg_isready -U auction_user"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 5
  
  redis:
    image: redis:7
    container_name: auction_redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    # healthcheck:
    #   test: ["CMD", "redis-cli", "ping"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 5

volumes:
  postgres_data:
  redis_data: