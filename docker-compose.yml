services:
  postgres:
    image: postgres:16
    container_name: auction_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # healthcheck:
    #   test: ["CMD-shell", "pg_isready -U auction_user"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 5
  
  redis:
    image: redis:7
    container_name: auction_redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    # healthcheck:
    #   test: ["CMD", "redis-cli", "ping"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auction_api
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_PORT=3000

volumes:
  postgres_data:
  redis_data: